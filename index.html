<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ground Level Language</title>
</head>

<body>
  <main class="app" id="app">
    <!---
    ===
    Start Screen
    ===
    -->
    <section class="start-screen" id="start-screen" aria-label="Ground Level Language">
      <div class="air" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <!-- start page button -->
      <button class="seed-button packet-button" id="seed-button" type="button" aria-label="Begin">
        <span class="seed-field" aria-hidden="true">
          <span class="seed-halo"></span>
          <span class="start-seed-art" id="start-seed-art"></span>
        </span>
      </button>
      <!---->
    </section>
    <!---->

    <!---
    ===
    Language Selection Screen
    ===
    -->
    <section class="language-screen" id="language-screen" aria-label="Language seeds" hidden>
      <div class="language-select-garden" id="language-select-garden">
        <!-- language seedbed -->
        <div class="language-seedbed" id="language-seedbed" role="list"></div>
        <!----->
        <!-- language mound button -->
        <button class="language-mound-button" id="language-mound-button" type="button"
          aria-label="Plant selected language seed">
          <span class="language-mound-art" id="language-mound-art" aria-hidden="true"></span>
        </button>
        <!----->
      </div>
    </section>
    <!---->

    <!--- 
    ===  
    Garden Hub
    === 
    -->
    <section class="path-screen garden-hub-screen" id="path-screen" aria-label="Language garden" hidden>
      <div class="garden-hub" id="garden-hub">

        <!----->
        <!-- Meaning Tree button -->
        <button class="garden-choice garden-meaning-choice" id="meaning-tree-button" type="button"
          aria-label="Meaning Tree">
          <span class="garden-mark garden-meaning" id="meaning-tree-art" aria-hidden="true"></span>
          <span class="garden-choice-label" aria-hidden="true">Meaning Tree</span>
        </button>
        <!---->
        <!-- SOUND GARDEN BUTTONS -->
        <!-- sound garden button -->
        <button class="garden-choice garden-flower-choice garden-flower-choice-a" id="sound-garden-button" type="button"
          aria-label="Sound Garden" data-garden-sound>
          <span class="garden-mark garden-flower" id="sound-garden-art" aria-hidden="true"></span>
          <span class="garden-choice-label" aria-hidden="true">Sound Garden</span>
        </button>
        <!-- sound garden button -->
        <button class="garden-choice garden-flower-choice garden-flower-choice-b" type="button" aria-label="Echo Flower"
          data-garden-sound>
          <span class="garden-mark garden-flower garden-flower-secondary" id="sound-garden-secondary-art"
            aria-hidden="true"></span>
          <span class="garden-choice-label" aria-hidden="true">Echo Flower</span>
        </button>
        <!-- sound garden button -->
        <button class="garden-choice garden-flower-choice garden-flower-choice-c" type="button"
          aria-label="Rhythm Flower" data-garden-sound>
          <span class="garden-mark garden-flower garden-flower-tertiary" id="sound-garden-tertiary-art"
            aria-hidden="true"></span>
          <span class="garden-choice-label" aria-hidden="true">Rhythm Flower</span>
        </button>
        <!----->
      </div>
    </section>
    <!----->

    <!-----
    ===
    Sound Garden 
    ===
    ----->
    <!-- MAIN SOUND GARDEN SCREEN  -->
    <section class="sound-garden-screen" id="sound-garden-screen" aria-label="Sound Garden" hidden>
      <!-- back button -->
      <button class="path-return-button sound-garden-return-button" id="sound-garden-return-button" type="button"
        aria-label="Back to path selection">
        <span aria-hidden="true"></span>
      </button>
      <!------>
      <div class="sound-garden" id="sound-garden">
        <!-- lesson categories list (syllables, tones, rhythm, etc)-->
        <ul class="sound-preview-list" id="sound-preview-list"></ul>
        <!------>
      </div>
    </section>
    <!----->

    <!-- SOUND LESSONS LIST SCREEN -->
    <section class="sound-lesson-list-screen" id="sound-lesson-list-screen" aria-label="Sound lessons" hidden>
      <!-- back button -->
      <button class="lesson-back-button" id="lesson-back-button" type="button" aria-label="Back to Sound Garden">
        <span aria-hidden="true"></span>
      </button>
      <!------>

      <!-- lesson category header -->
      <div class="lesson-header" id="lesson-header" aria-hidden="true"></div>
      <!----->

      <!-- lessons list -->
      <ol class="sound-lesson-list" id="sound-lesson-list"></ol>
      <!------>
    </section>
    <!----->

    <!-- SOUND LESSON SCREEN -->
    <section class="sound-lesson-screen" id="sound-lesson-screen" aria-label="Sound lesson" hidden>
      <div class="sound-lesson-shell" id="sound-lesson-shell">
        <div class="sound-lesson-content-slot" id="sound-lesson-content-slot">
          <div class="sound-lesson-layout" id="sound-lesson-layout">
            <!-- preview-->
            <section class="sound-lesson-section sound-preview-section" id="sound-preview-section"
              aria-label="Sound lesson preview"></section>
            <!------>

            <!-- primer -->
            <section class="sound-lesson-section sound-primer-section" id="sound-primer-section"
              aria-label="Sound primer" hidden></section>
            <!------>

            <!-- guided tuning -->
            <section class="sound-lesson-section sound-guided-section" id="sound-guided-section"
              aria-label="Guided tuning" hidden></section>
            <!------>

            <!-- recall -->
            <section class="sound-lesson-section sound-recall-section" id="sound-recall-section"
              aria-label="Perception recall" hidden></section>
            <!------>

            <!-- reflection -->
            <section class="sound-lesson-section sound-reflection-section" id="sound-reflection-section"
              aria-label="Sound reflection" hidden></section>
            <!------>
          </div>
        </div>

        <div class="sound-lesson-echo" id="sound-lesson-echo" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <div class="sound-lesson-progress" id="sound-lesson-progress" aria-hidden="true"></div>

        <div class="sound-lesson-actions">
          <button class="sound-lesson-section-back-button" id="sound-lesson-section-back-button" type="button"
            aria-label="Back to sound lessons">
            <span aria-hidden="true"></span>
          </button>

          <button class="sound-lesson-back-button" id="sound-lesson-back-button" type="button" aria-label="Back">
            <span aria-hidden="true"></span>
          </button>

          <button class="sound-lesson-replay-button" id="sound-lesson-replay-button" type="button"
            aria-label="Replay sound">
            <span aria-hidden="true"></span>
          </button>

          <button class="sound-lesson-next-button" id="sound-lesson-next-button" type="button" aria-label="Continue">
            <span aria-hidden="true"></span>
          </button>

          <button class="sound-lesson-section-next-button" id="sound-lesson-section-next-button" type="button"
            aria-label="Next sound section">
            <span aria-hidden="true"></span>
          </button>
        </div>
      </div>
    </section>
    <!---->

    <!-----
    ===
    Meaning Tree
    ===
    ----->
    <!-- MEANING ARC SCREEN -->
    <section class="meaning-arc-screen" id="meaning-arc-screen" aria-label="Meaning arcs" hidden>
      <!-- back button-->
      <button class="path-return-button meaning-arc-return-button" id="meaning-arc-return-button" type="button"
        aria-label="Back to path selection">
        <span aria-hidden="true"></span>
      </button>
      <!---->


      <div class="meaning-root-stage" id="meaning-root-stage">
        <!-- meaning tree icon -->
        <div class="meaning-root-mound" id="meaning-root-mound" aria-hidden="true"></div>
        <!----->
        <!-- root symbol -->
        <div class="meaning-root-art" id="meaning-root-art" aria-hidden="true"></div>
        <!----->
        <!-- arcs list -->
        <ul class="arc-list" id="arc-list" role="list"></ul>
        <!----->
      </div>
    </section>
    <!----->

    <!-- STORY BRANCH SCREEN -->
    <section class="story-branch-screen" id="story-branch-screen" aria-label="Story branches" hidden>
      <!-- back button -->
      <button class="path-return-button story-branch-return-button" id="story-branch-return-button" type="button"
        aria-label="Back to meaning arcs">
        <span aria-hidden="true"></span>
      </button>
      <!------>

      <!-- arc header -->
      <div class="story-arc-context" id="story-arc-context" aria-hidden="true">
        <span class="story-arc-root"></span>
        <span class="story-arc-symbol" id="story-arc-symbol"></span>
      </div>
      <!------>

      <!-- lesson pods -->
      <div class="story-pod-bed" id="story-pod-bed" role="list"></div>
      <!------>
    </section>

    <!-- STORY LESSONS SCREEN -->
    <section class="story-lessons story-lesson-screen" id="story-lessons" aria-label="Story lessons" hidden>
      <!-- back button -->
      <button class="path-return-button story-lesson-return-button" id="story-lessons-return-button" type="button"
        aria-label="Back to story selection">
        <span aria-hidden="true"></span>
      </button>
      <!------>

      <!-- STORY LESSON SHELL (start) -->
      <div class="story-lesson-shell" id="story-lesson-shell">
        <!-- STORY LESSON CONTENT SLOT (start) -->
        <div class="story-lesson-content" id="story-lesson-content">
          <!-- STORY LESSON LAYOUT (start) -->
          <div class="story-lesson-layout">

            <!-- preview world -->
            <div class="preview-world story-section-container" id="preview-world">
              <!-- preview signature -->
              <div class="preview-signature" id="preview-signature" aria-hidden="true"></div>
              <!------>

              <!-- track navigation -->
              <div class="track-nav-shell preview-track-shell">
                <button class="track-nav-button track-nav-back" id="preview-track-back-button" type="button"
                  aria-label="Previous preview image">
                  <span aria-hidden="true"></span>
                </button>

                <div class="preview-moment-track story-image-track" id="preview-image-track"
                  aria-label="Story preview images"></div>

                <button class="track-nav-button track-nav-next" id="preview-track-next-button" type="button"
                  aria-label="Next preview image">
                  <span aria-hidden="true"></span>
                </button>
              </div>

              <div class="preview-audio-track preview-audio-bed" id="preview-audio-track"
                aria-label="Story preview sounds"></div>

            </div>
            <!------>

            <!-- primer screen -->
            <section class="meaning-primer-screen" id="meaning-primer-screen" aria-label="Meaning primer" hidden>
              <div class="primer-world story-section-container" id="primer-world">
                <div class="track-nav-shell primer-track-shell">
                  <button class="track-nav-button track-nav-back" id="primer-track-back-button" type="button"
                    aria-label="Previous primer item">
                    <span aria-hidden="true"></span>
                  </button>

                  <div class="primer-card-track" id="primer-card-track" aria-label="Primer items"></div>

                  <button class="track-nav-button track-nav-next" id="primer-track-next-button" type="button"
                    aria-label="Next primer item">
                    <span aria-hidden="true"></span>
                  </button>
                </div>

                <div class="primer-echo" id="primer-echo" aria-hidden="true">
                  <span></span>
                  <span></span>
                  <span></span>
                </div>

              </div>
            </section>
            <!------>

            <!-- story screen-->
            <section class="story-screen" id="meaning-story-screen" aria-label="Meaning story" hidden>

              <div class="story-world story-section-container" id="story-world">
                <div class="story-mode-gate" id="story-mode-gate" aria-label="Story playback mode">
                  <button class="story-mode-button story-mode-auto" id="story-auto-button" type="button"
                    aria-label="Play story automatically">
                    <span aria-hidden="true"></span>
                  </button>

                  <button class="story-mode-button story-mode-manual" id="story-manual-button" type="button"
                    aria-label="Go through story manually">
                    <span aria-hidden="true"></span>
                  </button>
                </div>

                <div class="story-stage" id="story-stage">
                  <img class="story-image" id="story-image" src="" alt="" aria-hidden="true" />
                  <button class="story-audio-button" id="story-audio-button" type="button"
                    aria-label="Play story audio">
                    <span aria-hidden="true"></span>
                  </button>
                </div>

                <div class="story-echo" id="story-echo" aria-hidden="true">
                  <span></span>
                  <span></span>
                  <span></span>
                </div>

                <div class="story-section-progress" id="story-progress" aria-label="Section 1 of 1" hidden></div>

                <div class="story-controls" id="story-controls">
                  <button class="story-prev-button" id="story-prev-button" type="button"
                    aria-label="Previous story section">
                    <span aria-hidden="true"></span>
                  </button>

                  <button class="story-next-button" id="story-next-button" type="button"
                    aria-label="Next story section">
                    <span aria-hidden="true"></span>
                  </button>

                  <button class="story-replay-button" id="story-replay-button" type="button" aria-label="Replay story">
                    <span aria-hidden="true"></span>
                  </button>
                </div>
              </div>
            </section>

            <!-- recall screen -->
            <section class="meaning-recall-screen" id="meaning-recall-screen" aria-label="Recall" hidden>
              <div class="recall-world story-section-container" id="recall-world">
                <button class="recall-prompt-button" id="recall-audio-button" type="button"
                  aria-label="Replay recall prompt">
                  <span class="recall-prompt-orb" id="recall-prompt-orb" aria-hidden="true">
                    <span class="recall-pulse"></span>
                  </span>
                  <span class="recall-prompt-dot" aria-hidden="true"></span>
                </button>

                <div class="recall-choice-bed" id="recall-choice-bed" role="list"></div>

                <div class="recall-progress" id="recall-progress" aria-hidden="true"></div>

              </div>
            </section>

            <!-- reflection screen -->
            <section class="meaning-reflection-screen" id="meaning-reflection-screen" aria-label="Reflection" hidden>
              <div class="reflection-world" id="reflection-world">
                <div class="reflection-growth" id="reflection-growth" aria-hidden="true">
                  <span class="reflection-root"></span>
                  <span class="reflection-stem"></span>
                  <span class="reflection-leaf reflection-leaf-a"></span>
                  <span class="reflection-leaf reflection-leaf-b"></span>
                  <span class="reflection-bloom"></span>
                  <span class="reflection-ring reflection-ring-a"></span>
                  <span class="reflection-ring reflection-ring-b"></span>
                </div>

                <div class="reflection-story-pod" id="reflection-story-pod" aria-hidden="true">
                  <span class="reflection-story-symbols" id="reflection-story-symbols"></span>
                </div>

                <div class="reflection-actions">
                  <button class="reflection-action reflection-replay-button" id="reflection-replay-button" type="button"
                    aria-label="Replay story">
                    <span aria-hidden="true"></span>
                  </button>

                  <button class="reflection-action reflection-paths-button" id="reflection-paths-button" type="button"
                    aria-label="Return to path selection">
                    <span aria-hidden="true"></span>
                  </button>

                  <button class="reflection-action reflection-sound-garden-button" id="reflection-sound-garden-button"
                    type="button" aria-label="Enter Sound Garden">
                    <span aria-hidden="true"></span>
                  </button>
                </div>
              </div>
            </section>

          </div>
          <!-- STORY LESSON LAYOUT (end) -->
        </div>
        <!-- STORY LESSON CONTENT SLOT (end) -->

        <!-- story lesson progress container -->
        <div class="story-lesson-progress" id="story-lesson-progress" aria-label="Story lesson section 1 of 5">
          <span class="is-active" aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
        </div>
        <!----->

        <!-- story lesson nav container -->
        <div class="story-section-actions">
          <button class="story-section-back-button" id="story-section-back-button" type="button"
            aria-label="Previous story lesson section">
            <span aria-hidden="true"></span>
          </button>

          <button class="story-forward-button" id="story-forward-button" type="button"
            aria-label="Next story lesson section">
            <span aria-hidden="true"></span>
          </button>
        </div>
        <!---->
        <!-- STORY LESSON SHELL (end) -->
      </div>
    </section>
    <!-- MEANING LESSON SCREEN (end) -->

    <!-- DEMO FINISH SCREEN -->
    <section class="demo-finish-screen" id="demo-finish-screen" aria-label="Story complete" hidden>
      <div class="demo-finish-world">
        <div class="reflection-story-pod demo-finish-pod" aria-hidden="true">
          <span class="reflection-story-symbols" id="demo-finish-story-symbols"></span>
        </div>

        <div class="reflection-actions demo-finish-actions">
          <button class="reflection-action reflection-replay-button" id="demo-finish-replay-button" type="button"
            aria-label="Replay story">
            <span aria-hidden="true"></span>
          </button>

          <button class="reflection-action reflection-paths-button" id="demo-finish-language-button" type="button"
            aria-label="Try another language">
            <span aria-hidden="true"></span>
          </button>

          <button class="reflection-action demo-finish-start-button" id="demo-finish-start-button" type="button"
            aria-label="Return to start">
            <span aria-hidden="true"></span>
          </button>
        </div>
      </div>
    </section>

    <div hidden aria-hidden="true">
    </div>

  </main>

  <script src="/src/main.ts" type="module"></script>
</body>

</html>
