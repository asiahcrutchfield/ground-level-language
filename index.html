<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ground Level Language</title>
  </head>
  <body>
    <main class="app" id="app">
      <section class="start-screen" id="start-screen" aria-label="Ground Level Language">
        <div class="air" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <button class="seed-button" id="seed-button" type="button" aria-label="Begin">
          <span class="seed-field" aria-hidden="true">
            <span class="seed-halo"></span>
            <span class="start-seed-art" id="start-seed-art"></span>
          </span>
        </button>
      </section>

      <section class="language-screen" id="language-screen" aria-label="Language seeds" hidden>
        <div class="language-seedbed" id="language-seedbed" role="list"></div>
      </section>

      <section class="path-screen" id="path-screen" aria-label="Learning paths" hidden>
        <div class="path-gate">
          <button class="path-choice" id="meaning-tree-button" type="button" aria-label="Meaning Tree">
            <span class="path-mark path-mark-tree" id="meaning-tree-art" aria-hidden="true"></span>
          </button>
          <button class="path-choice" id="sound-garden-button" type="button" aria-label="Sound Garden">
            <span class="path-mark path-mark-garden" id="sound-garden-art" aria-hidden="true"></span>
          </button>
        </div>
      </section>

      <section class="meaning-arc-screen" id="meaning-arc-screen" aria-label="Meaning arcs" hidden>
        <ul class="arc-list" id="arc-list" role="list"></ul>
      </section>

      <section class="story-branch-screen" id="story-branch-screen" aria-label="Story branches" hidden>
        <div class="meaning-tree-map" aria-hidden="true">
          <span class="tree-trunk"></span>
          <span class="tree-branch tree-branch-a"></span>
          <span class="tree-branch tree-branch-b"></span>
          <span class="tree-branch tree-branch-c"></span>
        </div>

        <div class="story-pod-bed" id="story-pod-bed" role="list"></div>
      </section>

      <section class="meaning-preview-screen" id="meaning-preview-screen" aria-label="Meaning preview" hidden>
        <div class="preview-world" id="preview-world">
          <div class="preview-signature" id="preview-signature" aria-hidden="true"></div>

          <div class="preview-moment-track" id="preview-image-track" aria-label="Story preview images"></div>

          <div class="preview-audio-track" id="preview-audio-track" aria-label="Story preview sounds"></div>

          <div class="preview-actions">
            <button class="preview-back-button" id="preview-back-button" type="button" aria-label="Back to stories">
              <span aria-hidden="true"></span>
            </button>

            <button class="preview-enter-button" id="preview-enter-button" type="button" aria-label="Enter primer">
              <span aria-hidden="true"></span>
            </button>
          </div>
        </div>
      </section>

      <section class="meaning-primer-screen" id="meaning-primer-screen" aria-label="Meaning primer" hidden>
        <div class="primer-world" id="primer-world">
          <div class="primer-card-track" id="primer-card-track" aria-label="Primer items"></div>

          <div class="primer-echo" id="primer-echo" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>

          <div class="primer-actions">
            <button class="primer-back-button" id="primer-back-button" type="button" aria-label="Back to preview">
              <span aria-hidden="true"></span>
            </button>

            <button class="primer-next-button" id="primer-next-button" type="button" aria-label="Continue to story">
              <span aria-hidden="true"></span>
            </button>
          </div>
        </div>
      </section>

      <section class="story-screen" id="story-screen" aria-label="Story" hidden>
        <div class="story-orb" aria-hidden="true"></div>
      </section>
    </main>

    <script src="/src/main.ts" type="module"></script>
  </body>
</html>
