<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/src/style.css"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ground Level Ear Trainer</title>
  </head>
  <body>
    <div id="app">
      <div id="test-zone">
        <ul id="sound-primer">
          <!--append here-->
        </ul>
          <template id="sound-template">
            <li>
              <audio controls></audio>
            </li>
          </template>
        <button class="test-button start-button">▶️</button>

        <div id="test-area">
          <div class="test true_false-test">
            <div class="question_answer-area">
              <div class="question-area true_false-question_area">
                <div class="question-box true_false-box">
                  <audio controls class="question true_false-question"></audio>
                  <audio controls class="candidate-phoneme"></audio>
                </div>
              </div>
              
              <div class="answer-area true_false-answer_area">
                <div class="answer-box true_false-box">
                  <form id="true-false">
                    <input type="radio" name="true_false-answer" id="TF_Ans-1"
                    value="true">
                      <label for="TF_Ans-1">
                        ✅
                      </label>
                    <input type="radio" name="true_false-answer" id="TF_Ans-2" 
                    value="false">
                      <label for="TF_Ans-2">
                        ❌
                      </label>
                  </form>
                </div>
              </div>
            </div>
          </div>

          <div class="test matching-test">
            <div class="question_answer-area">
              <div class="question-area matching-question_area">
                <div class="question-box matching-box">
                  <audio controls class="question matching-question"></audio>
                </div>
              </div>
              
              <div class="answer-area matching-answer_area">
                <div class="answer-box matching-box">
                  <form id="matching">
                    <input type="radio" name="matching-answer" id="Match_Ans-1" class="ans-choice ans-1">
                      <label for="Match_Ans-1">
                        <audio controls class="question matching_Ans-choice ans-1_audio"></audio>
                      </label>
                    <input type="radio" name="matching-answer" id="Match_Ans-2" class="ans-choice ans-2">
                      <label for="Match_Ans-2">
                        <audio controls class="question matching_Ans-choice ans-2_audio"></audio>
                      </label>
                  </form>
                </div>
              </div>
            </div>
          </div>

          <div class="test rhythm-test">
            <div class="question_answer-area">
              <div class="question-area rhythm-question_area">
                <div class="question-box rhythm-box">
                  <audio class="question rhythm-question"></audio>
                </div>
              </div>
              
              <div class="answer-area rhythm-answer_area">
                <div class="answer-box rhythm-box">
                  <form id="rhythm">
                    <input type="radio" name="rhythm-answer" id="Rhythm_Ans-1" class="ans-choice ans-1">
                      <label for="Rhythm_Ans-1">
                        <audio class="question rhythm_Ans-choice ans-1_audio"></audio>
                      </label>
                    <input type="radio" name="rhythm-answer" id="Rhythm_Ans-2" class="ans-choice ans-2">
                      <label for="Rhythm_Ans-2">
                        <audio class="question rhythm_Ans-choice ans-2_audio"></audio>
                      </label>
                   </form>
                </div>
              </div>
            </div>
          </div>

          <div class="test syllable-test">
              <div class="question_answer-area">
                <div class="question-area syllable-question_area">
                  <div class="question-box syllable-box">
                    <audio class="question syllable-question"></audio>
                  </div>
                </div>
                
                <div class="answer-area syllable-answer_area">
                  <div class="answer-box syllable-box">
                    <form id="syllables">
                      <input type="radio" name="syllable-answer" id="Syllable_Ans-1" class="ans-choice ans-1">
                        <label for="Syllable_Ans-1">
                          <audio class="question syllable_Ans-choice ans-1_audio"></audio>
                        </label>
                      <input type="radio" name="syllable-answer" id="Syllable_Ans-2" class="ans-choice ans-2">
                        <label for="Syllable_Ans-2">
                          <audio class="question syllable_Ans-choice ans-2_audio"></audio>
                        </label>
                    </form>
                  </div>
                </div>
              </div>
            </div>

            <div class="test zh_tone-test">
              <div class="question_answer-area">
                <div class="question-area zh_tone-question_area">
                  <div class="question-box zh_tone-box">
                    <audio class="question zh_tone-question"></audio>
                  </div>
                </div>
                
                <div class="answer-area zh_tone-answer_area">
                  <div class="answer-box zh_tone-box">
                    <form id="zh_tone">
                      <input type="radio" name="zh_tone-answer" id="zh_tone_Ans-1" class="ans-choice ans-1">
                        <label for="zh_tone_Ans-1">
                          <audio class="question zh_tone-choice ans-1_audio"></audio>
                        </label>
                      <input type="radio" name="zh_tone-answer" id="zh_tone_Ans-2" class="ans-choice ans-2">
                        <label for="zh_tone_Ans-2">
                          <audio class="question zh_tone_Ans-choice ans-2_audio"></audio>
                        </label>
                    </form>
                  </div>
                </div>
              </div>
            </div>
        </div>

      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
